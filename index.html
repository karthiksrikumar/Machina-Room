<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Machina Mundi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --c-black:#0b0908;
    --c-black-soft:#151210;
    --c-marble:#ece3d1;
    --c-marble-dim:#c9bda2;
    --c-terracotta:#b5502e;
    --c-terracotta-dim:#8a3d24;
    --c-bronze:#b8894f;
    --c-bronze-dark:#7c5a34;
    --c-red:#6b2222;
    --c-gold:#c9a227;
    --font-display: 'Cinzel', serif;
    --font-body: 'Jost', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--c-black);
    font-family: var(--font-body);
    overflow:hidden;
    -webkit-tap-highlight-color: transparent;
  }
  #c{ position:fixed; inset:0; display:block; outline:none; }

  /* ---------- Loading ---------- */
  #loading{
    position:fixed; inset:0; z-index:100;
    background: radial-gradient(circle at 50% 40%, #1c1712 0%, var(--c-black) 70%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--c-marble);
    transition: opacity 1.1s ease;
  }
  #loading.hidden{ opacity:0; pointer-events:none; }
  .ring-spin{
    width:56px; height:56px; border-radius:50%;
    border:1.5px solid rgba(201,162,39,0.18);
    border-top-color: var(--c-gold);
    border-right-color: var(--c-bronze);
    animation: spin 1.4s linear infinite;
    margin-bottom:22px;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  #loading .title{
    font-family:var(--font-display); font-size:15px; letter-spacing:0.42em;
    text-transform:uppercase; color:var(--c-marble-dim); font-weight:500;
  }

  /* ---------- Door state instructions ---------- */
  #intro-instructions{
    position:fixed; left:0; right:0; bottom:9%; z-index:40;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    text-align:center; color:var(--c-marble); pointer-events:none;
    opacity:0; transition:opacity 1.4s ease;
  }
  #intro-instructions.show{ opacity:1; }
  #intro-instructions .push-label{
    font-family:var(--font-display); font-size:13px; letter-spacing:0.38em;
    text-transform:uppercase; color:var(--c-gold);
    animation: pulseGlow 2.6s ease-in-out infinite;
  }
  #intro-instructions .sub{
    font-size:12.5px; letter-spacing:0.06em; color:var(--c-marble-dim); font-weight:300;
  }
  @keyframes pulseGlow{
    0%,100%{ opacity:0.55; letter-spacing:0.38em; }
    50%{ opacity:1; letter-spacing:0.46em; }
  }

  /* ---------- Welcome ---------- */
  #welcome-overlay{
    position:fixed; inset:0; z-index:60;
    display:flex; align-items:center; justify-content:center;
    background:transparent;
    pointer-events:none;
  }
  #welcome-text{
    font-family:var(--font-display); color:var(--c-marble);
    font-size:clamp(28px, 5vw, 54px); letter-spacing:0.28em; font-weight:500;
    text-transform:uppercase; text-align:center; padding:0 20px;
    opacity:0; transform: translateY(14px) scale(0.98);
    text-shadow: 0 0 40px rgba(201,162,39,0.35);
  }
  #welcome-text.in{
    opacity:1; transform:translateY(0) scale(1);
    transition: opacity 2.1s ease, transform 2.1s ease;
  }
  #welcome-text.out{
    opacity:0; transform:translateY(-10px) scale(1.02);
    transition: opacity 1.6s ease, transform 1.6s ease;
  }

  /* ---------- HUD ---------- */
  #hud{
    position:fixed; left:0; right:0; bottom:5%; z-index:30;
    display:flex; justify-content:center; pointer-events:none;
    opacity:0; transition:opacity 1.6s ease;
  }
  #hud.show{ opacity:1; }
  #hud .pill{
    font-size:11.5px; letter-spacing:0.12em; color:var(--c-marble-dim);
    background:rgba(11,9,8,0.5); border:1px solid rgba(184,137,79,0.35);
    padding:9px 20px; border-radius:100px; backdrop-filter: blur(6px);
    font-weight:300;
  }

  #brandmark{
    position:fixed; top:26px; left:30px; z-index:30;
    font-family:var(--font-display); color:var(--c-marble);
    font-size:13px; letter-spacing:0.32em; text-transform:uppercase;
    opacity:0; transition:opacity 1.8s ease; pointer-events:none;
  }
  #brandmark.show{ opacity:0.85; }
  #brandmark span{ color:var(--c-gold); }

  /* ---------- Info Panel ---------- */
  #panel{
    position:fixed; top:0; right:0; height:100%;
    width:min(400px, 92vw);
    background: linear-gradient(160deg, rgba(21,18,16,0.97), rgba(11,9,8,0.98));
    border-left: 1px solid rgba(184,137,79,0.4);
    box-shadow: -30px 0 60px rgba(0,0,0,0.5);
    z-index:50;
    transform: translateX(100%);
    transition: transform 0.7s cubic-bezier(.16,.84,.44,1);
    padding: 74px 38px 40px;
    display:flex; flex-direction:column;
    overflow-y:auto;
  }
  #panel.open{ transform:translateX(0); }
  #panel .eyebrow{
    font-size:11px; letter-spacing:0.3em; text-transform:uppercase;
    color:var(--c-gold); margin-bottom:14px; font-weight:500;
  }
  #panel h2{
    font-family:var(--font-display); color:var(--c-marble);
    font-size:28px; line-height:1.25; margin:0 0 6px; font-weight:600;
    letter-spacing:0.01em;
  }
  #panel .subtitle{
    color:var(--c-terracotta); font-size:14px; font-style:italic;
    margin:0 0 26px; font-weight:400;
  }
  #panel .rule{
    width:46px; height:2px; background:var(--c-bronze); margin:0 0 24px; opacity:0.7;
  }
  #panel p{
    color:var(--c-marble-dim); font-size:15px; line-height:1.85; font-weight:300;
    margin:0 0 14px;
  }
  #panel-close{
    position:absolute; top:26px; right:28px;
    width:38px; height:38px; border-radius:50%;
    border:1px solid rgba(184,137,79,0.5); background:transparent;
    color:var(--c-marble-dim); font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: all 0.3s ease;
  }
  #panel-close:hover{ background:rgba(184,137,79,0.15); color:var(--c-marble); transform:rotate(90deg); }
  #panel-index{
    margin-top:auto; padding-top:28px; font-size:11px; letter-spacing:0.15em;
    color:var(--c-bronze-dark); border-top:1px solid rgba(184,137,79,0.2);
  }

  /* ---------- Toast ---------- */
  #toast{
    position:fixed; left:50%; bottom:12%; z-index:70;
    transform: translate(-50%, 12px); 
    background:rgba(11,9,8,0.88); border:1px solid rgba(201,162,39,0.45);
    color:var(--c-marble); font-size:13px; letter-spacing:0.03em; font-weight:300;
    padding:13px 24px; border-radius:8px; max-width:min(380px,86vw); text-align:center;
    opacity:0; pointer-events:none; transition: all 0.6s ease; line-height:1.5;
  }
  #toast.show{ opacity:1; transform:translate(-50%, 0); }

  ::-webkit-scrollbar{ width:6px; }
  ::-webkit-scrollbar-thumb{ background:rgba(184,137,79,0.4); border-radius:3px; }

  @media (prefers-reduced-motion: reduce){
    #intro-instructions .push-label{ animation:none; }
  }
</style>
</head>
<body>

  <canvas id="c"></canvas>

  <div id="loading">
    <div class="ring-spin"></div>
    <div class="title">Machina Mundi</div>
  </div>

  <div id="brandmark">Machina <span>Mundi</span></div>

  <div id="intro-instructions">
    <div class="push-label">Push the doors</div>
    <div class="sub">click and hold the bronze doors to enter</div>
  </div>

  <div id="welcome-overlay"><div id="welcome-text">Welcome to Machina Mundi</div></div>

  <div id="hud"><div class="pill">Drag to look around &nbsp;&middot;&nbsp; click an artifact to learn more</div></div>

  <div id="panel">
    <button id="panel-close" aria-label="Close">&times;</button>
    <div class="eyebrow" id="panel-eyebrow">Chapter</div>
    <h2 id="panel-title">Title</h2>
    <div class="subtitle" id="panel-subtitle">Subtitle</div>
    <div class="rule"></div>
    <p id="panel-body">Body</p>
    <div id="panel-index">01 / 07</div>
  </div>

  <div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function(){
"use strict";

/* =========================================================================
   MACHINA MUNDI — a small rotunda that tells the story of the program.
   Built entirely with primitive Three.js geometry and canvas textures.
   ========================================================================= */

var COLOR = {
  black: 0x0b0908,
  blackSoft: 0x1a1512,
  marble: 0xece3d1,
  marbleDim: 0xc9bda2,
  terracotta: 0xb5502e,
  terracottaDim: 0x8a3d24,
  bronze: 0xb8894f,
  bronzeDark: 0x6e4e2c,
  red: 0x6b2222,
  gold: 0xc9a227,
};

var ROOM_R = 15;
var DOOR_ANGLE = -Math.PI/2; // door sits at (0, *, -R)
var GAP = 0.52;

/* -------------------------------------------------------------------------
   Program content (all copy authored fresh from the org brief, no em dashes)
   ------------------------------------------------------------------------- */
var STOPS = [
  {
    key:'origins',
    eyebrow:'Chapter One',
    title:'Origins',
    subtitle:'Where the idea began',
    body:'Machina Mundi started as a small summer program, just three sessions long, built to close a gap. While well funded schools and corporate labs raced ahead in artificial intelligence, students in Hartford and East Hartford had little access to the tools shaping their future. Early on, students noticed something else. The chatbots they tried did not understand the way they actually talked. Most language models are trained on text that barely includes African American Vernacular English, so the technology was never built to hear an entire community. What began as a coding camp became a mission to fix the data itself.'
  },
  {
    key:'camp',
    eyebrow:'Chapter Two',
    title:'AI Pathways Camp',
    subtitle:'Learning by building',
    body:'This is where it happens hands on. Students train small machine learning models, take apart the logic inside chatbots, and question the choices built into the systems they use every day. More than nine hundred students have gone through the program so far, moving from users of technology to builders of it.'
  },
  {
    key:'pollen',
    eyebrow:'Chapter Three',
    title:'Project POLLEN',
    subtitle:'A dataset that listens',
    body:'Project POLLEN exists to correct a bias of representation. Working with local churches, schools, and families, the team recorded everyday, unscripted conversation and transcribed it exactly as spoken, without smoothing it into standard English. The result is ConvoAAVE, a growing open dataset of nearly fifty thousand words, published with full documentation. Models trained on it understood dialect better without flattening it, and the improved tools went right back to the classrooms and families who helped build them.'
  },
  {
    key:'policy',
    eyebrow:'Chapter Four',
    title:'Federal Policy',
    subtitle:'Taking it to Washington',
    body:'Grassroots research does not stay local for long. Working with the office of Congressman John Larson and guidance from the Congressional Research Service, students authored research briefs on the gaps in AI education across Hartford\u2019s public schools. That research became the foundation of a federal grant proposal to fund AI education, teacher training, and programming for underserved schools. The proposal was introduced in 2026, and the team is preparing to testify before Congress in support of a bipartisan bill.'
  },
  {
    key:'partners',
    eyebrow:'Chapter Five',
    title:'Partners',
    subtitle:'A network built on trust',
    body:'None of this happens alone. Code Ninjas hosted the earliest programs and helped shape the beginner curriculum. The YMCA carried the camp beyond the classroom. Local schools opened their doors, and neighborhood churches and community groups helped families feel safe joining Project POLLEN. City and federal offices, including Congressman Larson and Mayor Arunan Arulampalam, help turn grassroots work into lasting policy.'
  },
  {
    key:'team',
    eyebrow:'Chapter Six',
    title:'The People',
    subtitle:'Students building for students',
    body:'Machina Mundi was founded by Karthik Srikumar, a student who built the first programs, led the ConvoAAVE dataset, and opened the earliest doors with the YMCA, Code Ninjas, and Congress. An advisory board of Code Ninjas co founders and a volunteer team of students, several now in college, keep the programs growing, one classroom and one dataset at a time.'
  },
  {
    key:'recognition',
    eyebrow:'Chapter Seven',
    title:'Recognition',
    subtitle:'Still early',
    body:'Nine hundred students trained. Fifty thousand words collected. Five major partners embedded in the community. In 2026, Machina Mundi was named a Regional Finalist for the Princeton Prize in Race Relations. The organization is now working toward a 2028 vision, scaling from local classrooms to federal legislation.'
  }
];

/* -------------------------------------------------------------------------
   Boot
   ------------------------------------------------------------------------- */
var canvas = document.getElementById('c');
var renderer = new THREE.WebGLRenderer({ canvas:canvas, antialias:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;

var scene = new THREE.Scene();
scene.background = new THREE.Color(COLOR.black);
scene.fog = new THREE.FogExp2(COLOR.black, 0.018);

var camera = new THREE.PerspectiveCamera(52, window.innerWidth/window.innerHeight, 0.1, 200);
var DOOR_X = 0, DOOR_Z = -ROOM_R;
var START_POS = new THREE.Vector3(0, 3.0, DOOR_Z - 10);
var LOOK_POS = new THREE.Vector3(0, 2.6, DOOR_Z);
camera.position.copy(START_POS);
camera.lookAt(LOOK_POS);

/* -------------------------------------------------------------------------
   Texture helpers (all procedural canvas, zero external images)
   ------------------------------------------------------------------------- */
function mkCanvas(size){ var c=document.createElement('canvas'); c.width=c.height=size; return c; }

function marbleTexture(baseHex, veinHex, size){
  size = size||512;
  var c = mkCanvas(size), ctx = c.getContext('2d');
  ctx.fillStyle = '#'+baseHex.toString(16).padStart(6,'0');
  ctx.fillRect(0,0,size,size);
  ctx.globalAlpha = 0.18;
  for(var i=0;i<26;i++){
    ctx.strokeStyle = '#'+veinHex.toString(16).padStart(6,'0');
    ctx.lineWidth = Math.random()*1.6+0.3;
    ctx.beginPath();
    var x = Math.random()*size, y=0;
    ctx.moveTo(x,y);
    for(var s=0;s<6;s++){
      x += (Math.random()-0.5)*size*0.35;
      y += size/6;
      ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  var tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

function mosaicFloorTexture(size){
  size = size || 1024;
  var c = mkCanvas(size), ctx = c.getContext('2d');
  var cx = size/2, cy = size/2, R = size/2;
  // base
  ctx.fillStyle = '#e4dac4'; ctx.fillRect(0,0,size,size);
  // concentric rings alternating tones
  var palette = ['#e4dac4','#cabb95','#b5502e','#0b0908','#c9a227'];
  var rings = 16;
  for(var i=rings;i>0;i--){
    var r = R*(i/rings);
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle = palette[i%3===0? 2 : (i%5===0?4:(i%2===0?0:1))];
    ctx.globalAlpha = (i%5===0)?1:0.85;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  // greek key border ring
  var borderR = R*0.97, borderW = R*0.05;
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,borderR,0,Math.PI*2);
  ctx.arc(cx,cy,borderR-borderW,0,Math.PI*2,true);
  ctx.clip();
  ctx.fillStyle = '#0b0908'; ctx.fillRect(0,0,size,size);
  ctx.strokeStyle = '#c9a227'; ctx.lineWidth = 3;
  var steps = 90;
  for(var k=0;k<steps;k++){
    var a = (k/steps)*Math.PI*2;
    var x = cx + Math.cos(a)*borderR;
    var y = cy + Math.sin(a)*borderR;
    ctx.save();
    ctx.translate(x,y); ctx.rotate(a);
    ctx.strokeRect(-borderW*0.4, -borderW*0.4, borderW*0.55, borderW*0.55);
    ctx.restore();
  }
  ctx.restore();
  // central medallion
  ctx.beginPath(); ctx.arc(cx,cy,R*0.12,0,Math.PI*2);
  ctx.fillStyle = '#c9a227'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,R*0.09,0,Math.PI*2);
  ctx.fillStyle = '#0b0908'; ctx.fill();
  // radial segment lines
  ctx.strokeStyle = 'rgba(11,9,8,0.35)'; ctx.lineWidth = 1.5;
  for(var seg=0; seg<32; seg++){
    var ang = (seg/32)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(ang)*R*0.14, cy + Math.sin(ang)*R*0.14);
    ctx.lineTo(cx + Math.cos(ang)*borderR*0.98, cy + Math.sin(ang)*borderR*0.98);
    ctx.stroke();
  }
  var tex = new THREE.CanvasTexture(c);
  return tex;
}

function bronzeDoorTexture(size){
  size = size||512;
  var c = mkCanvas(size), ctx = c.getContext('2d');
  var g = ctx.createLinearGradient(0,0,size,size);
  g.addColorStop(0,'#a9793f'); g.addColorStop(0.5,'#8a6236'); g.addColorStop(1,'#6e4e2c');
  ctx.fillStyle = g; ctx.fillRect(0,0,size,size);
  var rows=6, cols=4;
  for(var r=0;r<rows;r++){
    for(var col=0; col<cols; col++){
      var x = size*(col+0.5)/cols, y = size*(r+0.5)/rows;
      var rad = size/cols*0.28;
      var rg = ctx.createRadialGradient(x-rad*0.3,y-rad*0.3,rad*0.1,x,y,rad);
      rg.addColorStop(0,'#e8cd8f'); rg.addColorStop(0.5,'#b8894f'); rg.addColorStop(1,'#5b3f22');
      ctx.beginPath(); ctx.arc(x,y,rad,0,Math.PI*2); ctx.fillStyle=rg; ctx.fill();
      ctx.beginPath(); ctx.arc(x,y,rad*0.32,0,Math.PI*2); ctx.fillStyle='rgba(11,9,8,0.4)'; ctx.fill();
    }
  }
  ctx.strokeStyle = 'rgba(11,9,8,0.5)'; ctx.lineWidth = 10;
  ctx.strokeRect(14,14,size-28,size-28);
  var tex = new THREE.CanvasTexture(c);
  return tex;
}

function softDot(size){
  size = size||64;
  var c = mkCanvas(size), ctx = c.getContext('2d');
  var g = ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(c);
}

function labelSprite(text, sizeW, colorHex){
  sizeW = sizeW || 512;
  var c = document.createElement('canvas');
  c.width = sizeW; c.height = sizeW*0.32;
  var ctx = c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  ctx.font = '500 '+Math.floor(c.height*0.34)+'px Cinzel, serif';
  ctx.fillStyle = colorHex || '#ece3d1';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 10;
  ctx.fillText(text.toUpperCase(), c.width/2, c.height/2);
  var tex = new THREE.CanvasTexture(c);
  var mat = new THREE.SpriteMaterial({ map:tex, transparent:true, depthWrite:false });
  var sprite = new THREE.Sprite(mat);
  sprite.scale.set(3.4, 3.4*(c.height/c.width), 1);
  return sprite;
}

function numeralSprite(n){
  var c = document.createElement('canvas'); c.width=128; c.height=128;
  var ctx = c.getContext('2d');
  ctx.beginPath(); ctx.arc(64,64,58,0,Math.PI*2);
  ctx.fillStyle = 'rgba(11,9,8,0.75)'; ctx.fill();
  ctx.lineWidth=3; ctx.strokeStyle='#c9a227'; ctx.stroke();
  ctx.font = '600 54px Jost, sans-serif';
  ctx.fillStyle = '#ece3d1'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(String(n), 64, 70);
  var tex = new THREE.CanvasTexture(c);
  var mat = new THREE.SpriteMaterial({ map:tex, transparent:true, depthWrite:false });
  var sp = new THREE.Sprite(mat);
  sp.scale.set(0.7,0.7,1);
  return sp;
}

/* -------------------------------------------------------------------------
   Lighting
   ------------------------------------------------------------------------- */
var hemi = new THREE.HemisphereLight(0x6e5a3f, 0x0b0908, 0.55);
scene.add(hemi);

var oculusLight = new THREE.PointLight(0xffe3b0, 1.6, 40, 2);
oculusLight.position.set(0, 12, 0);
oculusLight.castShadow = true;
oculusLight.shadow.mapSize.set(1024,1024);
scene.add(oculusLight);

var fillLight = new THREE.DirectionalLight(0x8a6236, 0.25);
fillLight.position.set(-8, 6, -4);
scene.add(fillLight);

/* -------------------------------------------------------------------------
   Floor
   ------------------------------------------------------------------------- */
var floorTex = mosaicFloorTexture(1024);
var floor = new THREE.Mesh(
  new THREE.CircleGeometry(ROOM_R, 72),
  new THREE.MeshStandardMaterial({ map:floorTex, roughness:0.55, metalness:0.08 })
);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

/* -------------------------------------------------------------------------
   Wall (C shaped, gap left open for the door)
   ------------------------------------------------------------------------- */
var wallTex = marbleTexture(COLOR.marble, COLOR.marbleDim, 512);
wallTex.repeat.set(6,1.4);
var wall = new THREE.Mesh(
  new THREE.CylinderGeometry(ROOM_R, ROOM_R, 9, 64, 1, true, DOOR_ANGLE+GAP/2, Math.PI*2-GAP),
  new THREE.MeshStandardMaterial({ map:wallTex, side:THREE.BackSide, roughness:0.85, metalness:0.02 })
);
wall.position.y = 4.5;
wall.receiveShadow = true;
scene.add(wall);

// base skirt (dark stone plinth around wall)
var skirt = new THREE.Mesh(
  new THREE.CylinderGeometry(ROOM_R+0.05, ROOM_R+0.05, 0.9, 64, 1, true, DOOR_ANGLE+GAP/2, Math.PI*2-GAP),
  new THREE.MeshStandardMaterial({ color:COLOR.black, roughness:0.7 })
);
skirt.position.y = 0.45;
scene.add(skirt);

/* -------------------------------------------------------------------------
   Dome with oculus
   ------------------------------------------------------------------------- */
var domeTex = marbleTexture(COLOR.marble, COLOR.bronzeDark, 512);
var dome = new THREE.Mesh(
  new THREE.SphereGeometry(ROOM_R, 40, 24, 0, Math.PI*2, 0.22, Math.PI/2-0.02),
  new THREE.MeshStandardMaterial({ map:domeTex, side:THREE.BackSide, roughness:0.8 })
);
dome.position.y = 9;
scene.add(dome);

// light shaft from oculus (soft additive cone)

  pathPoints.push(new THREE.Vector3(px,0.02,pz));

  var group = new THREE.Group();
  group.position.set(px,0,pz);
  group.lookAt(0,0,0);

  var base = pedestalBase();
  group.add(base);

  var icon = ICON_BUILDERS[s]();
  icon.position.y = 2.0;
  group.add(icon);

  var label = labelSprite(STOPS[s].title, 640, '#ece3d1');
  label.position.y = 3.15;
  group.add(label);

  var numeral = numeralSprite(s+1);
  numeral.position.set(0, 1.3, 0.7);
  group.add(numeral);

  var hit = new THREE.Mesh(new THREE.SphereGeometry(1.3,10,10), new THREE.MeshBasicMaterial({visible:false}));
  hit.position.y = 1.6;
  group.add(hit);

  group.userData.stopIndex = s;
  group.userData.iconGroup = icon;
  group.traverse(function(obj){ obj.userData.rootGroup = group; });

  scene.add(group);
  pedestals.push(group);
}

var cameraDollyT = 0;
var doorOpenSpeed = 0.55;

var clock = new THREE.Clock();
var raycaster = new THREE.Raycaster();
var pointer = new THREE.Vector2();

function setPointer(e){
  var x = (e.touches? e.touches[0].clientX : e.clientX);
  var y = (e.touches? e.touches[0].clientY : e.clientY);
  pointer.x = (x/window.innerWidth)*2-1;
  pointer.y = -(y/window.innerHeight)*2+1;
}

function findRoot(obj){
  var o = obj;
  while(o){
    if(o.userData && o.userData.rootGroup) return o.userData.rootGroup;
    if(o.userData && (o.userData.isDoor || o.userData.isSecret || o.userData.isBall || o.userData.isCore)) return o;
    o = o.parent;
  }
  return null;
}

function onPointerDown(e){
  setPointer(e);
  raycaster.setFromCamera(pointer, camera);

  if(STATE === 'door'){
    var hitDoor = raycaster.intersectObject(doorHit, false);
    if(hitDoor.length){ openDoors(); }
    return;
  }

  if(STATE !== 'explore') return;

  var targets = pedestals.concat([secretTile, armillary]);
  var intersects = raycaster.intersectObjects(targets, true);
  if(!intersects.length) return;
  var root = findRoot(intersects[0].object);
  if(!root) return;

  if(root.userData && typeof root.userData.stopIndex === 'number'){
    openPanel(root.userData.stopIndex);
    return;
  }
  if(root.userData && root.userData.isSecret){
    spawnOwl(root.position);
    showToast('You found a quiet detail. Machina Mundi listens closely, even in the small places.');
    return;
  }
  // ball click (search deeper since ball is nested under a pedestal icon group)
  var obj = intersects[0].object;
  var p = obj;
  while(p){
    if(p.userData && p.userData.isBall){ handleBallClick(p); return; }
    if(p === armillary){ 
      showToast('You have found the center of Machina Mundi.');
      return;
    }
    p = p.parent;
  }
}

function handleBallClick(ball){
  ball.userData.clicks++;
  ball.userData.bounceBoost = 0.5;
  if(ball.userData.clicks >= 5){
    var worldPos = new THREE.Vector3();
    ball.getWorldPosition(worldPos);
    spawnConfetti(worldPos);
    showToast('The kids are having a great time.');
    ball.userData.clicks = 0;
  }
}

renderer.domElement.addEventListener('pointerdown', onPointerDown);

/* -------------------------------------------------------------------------
   Door open sequence
   ------------------------------------------------------------------------- */
function openDoors(){
  if(STATE !== 'door') return;
  STATE = 'opening';
  document.getElementById('intro-instructions').classList.remove('show');
}

/* -------------------------------------------------------------------------
   Panel
   ------------------------------------------------------------------------- */
var panelEl = document.getElementById('panel');
function openPanel(idx){
  var s = STOPS[idx];
  document.getElementById('panel-eyebrow').textContent = s.eyebrow;
  document.getElementById('panel-title').textContent = s.title;
  document.getElementById('panel-subtitle').textContent = s.subtitle;
  document.getElementById('panel-body').textContent = s.body;
  document.getElementById('panel-index').textContent = String(idx+1).padStart(2,'0') + ' / ' + String(STOPS.length).padStart(2,'0');
  panelEl.classList.add('open');
}
document.getElementById('panel-close').addEventListener('click', function(){
  panelEl.classList.remove('open');
});

/* -------------------------------------------------------------------------
   Toast
   ------------------------------------------------------------------------- */
var toastEl = document.getElementById('toast');
var toastTimer = null;
function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ toastEl.classList.remove('show'); }, 3600);
}

/* -------------------------------------------------------------------------
   Resize
   ------------------------------------------------------------------------- */
window.addEventListener('resize', function(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* -------------------------------------------------------------------------
   Boot sequence
   ------------------------------------------------------------------------- */
setTimeout(function(){
  document.getElementById('loading').classList.add('hidden');
  STATE = 'door';
  document.getElementById('intro-instructions').classList.add('show');
}, 1400);

/* -------------------------------------------------------------------------
   Animate
   ------------------------------------------------------------------------- */
function easeInOutCubic(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

function animate(){
  requestAnimationFrame(animate);
  var dt = Math.min(clock.getDelta(), 0.05);
  var t = clock.getElapsedTime();

  // torches flicker
  torches.forEach(function(tg){
    var seed = tg.userData.seed;
    var flick = 0.75 + Math.sin(t*9+seed)*0.12 + Math.sin(t*23+seed)*0.08 + (Math.random()-0.5)*0.06;
    tg.userData.light.intensity = 0.7*flick;
    tg.userData.flame.scale.setScalar(0.9+flick*0.25);
  });
  oculusLight.intensity = 1.5 + Math.sin(t*0.6)*0.08;

  // armillary rotation
  armillary.rotation.y += dt*0.12;
  armillary.children.forEach(function(ring){
    if(ring.userData.spinSpeed){
      if(ring.userData.spinAxis==='x') ring.rotation.x += dt*ring.userData.spinSpeed;
      if(ring.userData.spinAxis==='y') ring.rotation.y += dt*ring.userData.spinSpeed;
      if(ring.userData.spinAxis==='z') ring.rotation.z += dt*ring.userData.spinSpeed;
    }
    if(ring.userData.isCore){
      ring.scale.setScalar(1+Math.sin(t*2)*0.06);
    }
  });

  // dust motes drift upward, wrap
  var posAttr = moteGeo.attributes.position;
  for(var mi=0; mi<moteCount; mi++){
    var yv = posAttr.getY(mi) + dt*0.35;
    if(yv > 13) yv = 0;
    posAttr.setY(mi, yv);
    posAttr.setX(mi, posAttr.getX(mi) + Math.sin(t*0.5+mi)*0.0009);
  }
  posAttr.needsUpdate = true;

  // secret tile subtle pulse
  secretTile.material.emissiveIntensity = 0.1 + Math.sin(t*1.4)*0.08;

  // pedestal icon animations
  pedestals.forEach(function(p, idx){
    var icon = p.userData.iconGroup;
    icon.rotation.y = Math.sin(t*0.25 + idx)*0.15;

    if(icon.userData.flame){
      icon.userData.flame.scale.setScalar(0.9+Math.sin(t*8+idx)*0.15);
    }
    if(icon.userData.ball){
      var ball = icon.userData.ball;
      var boost = ball.userData.bounceBoost || 0;
      if(boost>0){ ball.userData.bounceBoost = Math.max(0, boost - dt*0.6); }
      var h = 0.4 + Math.abs(Math.sin(t*2.4))*(0.28+boost);
      ball.position.y = h;
      ball.position.x = Math.sin(t*0.7)*0.35;
      icon.userData.kid1.rotation.y = Math.sin(t*1.2)*0.3;
      icon.userData.kid2.rotation.y = Math.sin(t*1.2+1.5)*0.3;
      icon.userData.kid1.position.y = Math.abs(Math.sin(t*2.4))*0.04;
      icon.userData.kid2.position.y = Math.abs(Math.sin(t*2.4+0.8))*0.04;
    }
    if(icon.userData.words){
      icon.userData.words.children.forEach(function(w, wi){
        var a = w.userData.baseAngle + t*0.4;
        w.position.set(Math.cos(a)*w.userData.radius, w.userData.yOff + Math.sin(t+wi)*0.05, Math.sin(a)*w.userData.radius);
        w.rotation.y = a;
      });
    }
    if(icon.userData.wreath){
      icon.userData.wreath.rotation.z += dt*0.3;
    }
    if(icon.userData.medal){
      icon.userData.medal.rotation.y += dt*0.6;
    }
  });

  // transient objects (owl, confetti)
  for(var ti = transientObjects.length-1; ti>=0; ti--){
    var obj = transientObjects[ti];
    var age = t - obj.userData.spawnTime;
    if(obj.userData.vel){
      obj.userData.vel.y -= dt*1.8;
      obj.position.addScaledVector(obj.userData.vel, dt);
      obj.rotation.z += dt*obj.userData.spin;
      obj.material.opacity = Math.max(0, 1-age/1.6);
      obj.material.transparent = true;
      if(age>1.6){ scene.remove(obj); transientObjects.splice(ti,1); }
    } else if(obj.userData.wingL){
      obj.position.y += dt*0.9;
      obj.userData.wingL.rotation.z = Math.sin(t*14)*0.5;
      obj.userData.wingR.rotation.z = -Math.sin(t*14)*0.5;
      obj.children.forEach(function(c){ c.material.transparent = true; c.material.opacity = Math.max(0, 1-age/2.0); });
      if(age>2.0){ scene.remove(obj); transientObjects.splice(ti,1); }
    }
  }

  // state machine
  if(STATE === 'door'){
    doorHit.material.opacity = 1;
  } else if(STATE === 'opening'){
    doorProgress = Math.min(1, doorProgress + dt*doorOpenSpeed);
    var eased = easeInOutCubic(doorProgress);
    leftPivot.rotation.y = -eased*2.05;
    rightPivot.rotation.y = eased*2.05;

    cameraDollyT = Math.min(1, cameraDollyT + dt*0.22);
    var camEase = easeInOutCubic(cameraDollyT);
    var endPos = new THREE.Vector3(0, 3.4, 2.5);
    camera.position.lerpVectors(START_POS, endPos, camEase);
    var lookTarget = new THREE.Vector3().lerpVectors(LOOK_POS, new THREE.Vector3(0,2.6,0), camEase);
    camera.lookAt(lookTarget);

    if(doorProgress>=1 && cameraDollyT>=1){
      STATE = 'welcome';
      document.getElementById('welcome-text').classList.add('in');
      setTimeout(function(){
        document.getElementById('welcome-text').classList.remove('in');
        document.getElementById('welcome-text').classList.add('out');
      }, 2400);
      setTimeout(function(){
        STATE = 'explore';
        controls.object.position.copy(camera.position);
        controls.update();
        controls.enabled = true;
        document.getElementById('hud').classList.add('show');
        document.getElementById('brandmark').classList.add('show');
      }, 4100);
    }
  } else if(STATE === 'explore'){
    controls.update();
  }

  renderer.render(scene, camera);
}
animate();

})();
</script>
</body>
</html>
