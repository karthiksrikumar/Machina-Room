<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machina Mundi - Interactive Exhibition</title>
    <style>
        :root {
            --cream: #F5F0E8;
            --terracotta: #C67B5C;
            --gold: #D4A853;
            --dark: #1C1C1C;
            --wine: #8B3A3A;
            --sage: #8A9A7B;
            --warm-brown: #5C3D2E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d0d0d;
            overflow: hidden;
            font-family: 'Georgia', 'Times New Roman', 'Palatino', serif;
            cursor: default;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            height: 100vh;
            width: 100vw;
        }

        canvas {
            display: block;
        }

        #overlay-welcome {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }
        #overlay-welcome.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #overlay-welcome .welcome-card {
            background: rgba(28, 28, 28, 0.85);
            border: 2px solid #D4A853;
            border-radius: 16px;
            padding: 40px 50px;
            text-align: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 80px rgba(212, 168, 83, 0.25);
            pointer-events: auto;
        }
        #overlay-welcome h1 {
            color: #F5F0E8;
            font-size: clamp(1.6rem, 3.5vw, 2.8rem);
            font-weight: 400;
            letter-spacing: 0.04em;
            margin: 0 0 10px;
            text-shadow: 0 0 40px rgba(212, 168, 83, 0.5);
        }
        #overlay-welcome .subtitle {
            color: #D4A853;
            font-size: clamp(0.9rem, 1.5vw, 1.2rem);
            letter-spacing: 0.06em;
            font-style: italic;
            animation: pulse-subtitle 2.2s ease-in-out infinite;
        }
        @keyframes pulse-subtitle {
            0%,
            100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }
        #overlay-welcome .hint {
            color: #C67B5C;
            font-size: 0.85rem;
            margin-top: 18px;
            letter-spacing: 0.03em;
            opacity: 0.8;
        }
        #overlay-welcome .click-zone {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(300px, 50vw);
            height: min(380px, 55vh);
            cursor: pointer;
            pointer-events: auto;
            z-index: 2;
            border-radius: 20px;
        }

        #info-panel {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            z-index: 20;
            background: rgba(28, 28, 28, 0.92);
            border: 1px solid #D4A853;
            border-radius: 12px;
            padding: 22px 28px;
            max-width: 550px;
            width: 90%;
            color: #F5F0E8;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            transition: transform 0.45s cubic-bezier(0.22, 0.61, 0.36, 1);
            pointer-events: auto;
        }
        #info-panel.visible {
            transform: translateX(-50%) translateY(0);
        }
        #info-panel h3 {
            color: #D4A853;
            font-size: 1.2rem;
            font-weight: 400;
            margin: 0 0 8px;
            letter-spacing: 0.03em;
        }
        #info-panel p {
            font-size: 0.9rem;
            line-height: 1.55;
            color: #e0d8cc;
            margin: 0;
        }
        #info-panel .close-btn {
            position: absolute;
            top: 10px;
            right: 14px;
            background: none;
            border: none;
            color: #C67B5C;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: color 0.2s;
        }
        #info-panel .close-btn:hover {
            color: #F5F0E8;
        }

        #easter-egg-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            z-index: 30;
            background: rgba(139, 58, 58, 0.9);
            border: 1px solid #D4A853;
            border-radius: 24px;
            padding: 10px 24px;
            color: #F5F0E8;
            font-size: 0.9rem;
            letter-spacing: 0.03em;
            transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
            pointer-events: none;
        }
        #easter-egg-toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 600px) {
            #overlay-welcome .welcome-card {
                padding: 24px 20px;
                border-radius: 12px;
            }
            #info-panel {
                bottom: 16px;
                padding: 16px 18px;
                width: 94%;
            }
        }
    </style>
</head>
<body>

    <div id="overlay-welcome">
        <div class="welcome-card">
            <h1>Welcome to Machina Mundi</h1>
            <p class="subtitle">Push doors to enter</p>
            <p class="hint">&#x2191; click the doors</p>
        </div>
        <div class="click-zone" id="door-click-zone" title="Push doors to enter"></div>
    </div>

    <div id="info-panel">
        <button class="close-btn" id="close-info">&times;</button>
        <h3 id="info-title"></h3>
        <p id="info-body"></p>
    </div>

    <div id="easter-egg-toast"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ─────────────────────────────────────
        // DOM ELEMENTS
        // ─────────────────────────────────────
        const overlayWelcome = document.getElementById('overlay-welcome');
        const doorClickZone = document.getElementById('door-click-zone');
        const infoPanel = document.getElementById('info-panel');
        const infoTitle = document.getElementById('info-title');
        const infoBody = document.getElementById('info-body');
        const closeInfoBtn = document.getElementById('close-info');
        const easterToast = document.getElementById('easter-egg-toast');

        // ─────────────────────────────────────
        // THREE.JS SETUP
        // ─────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1512);
        scene.fog = new THREE.Fog(0x1a1512, 8, 35);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.5, 50);
        camera.position.set(0, 1.2, -7);
        camera.lookAt(0, 0.6, 0);

        const orbitControls = new OrbitControls(camera, renderer.domElement);
        orbitControls.enabled = false;
        orbitControls.target.set(0, 0.8, 9);
        orbitControls.minDistance = 3;
        orbitControls.maxDistance = 16;
        orbitControls.maxPolarAngle = Math.PI * 0.7;
        orbitControls.minPolarAngle = 0.25;
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.08;
        orbitControls.update();

        // ─────────────────────────────────────
        // LIGHTING
        // ─────────────────────────────────────
        const ambientLight = new THREE.AmbientLight(0xf5e8d8, 0.7);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffeedd, 3.5);
        sunLight.position.set(8, 12, -4);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 40;
        sunLight.shadow.camera.left = -15;
        sunLight.shadow.camera.right = 15;
        sunLight.shadow.camera.top = 10;
        sunLight.shadow.camera.bottom = -10;
        sunLight.shadow.bias = -0.0003;
        scene.add(sunLight);

        const warmSpot1 = new THREE.SpotLight(0xffd5b8, 12, 18, Math.PI / 7, 0.3, 0.5);
        warmSpot1.position.set(-4, 5, 5);
        warmSpot1.castShadow = true;
        scene.add(warmSpot1);

        const warmSpot2 = new THREE.SpotLight(0xffd5b8, 10, 16, Math.PI / 7, 0.3, 0.5);
        warmSpot2.position.set(4, 5, 11);
        warmSpot2.castShadow = true;
        scene.add(warmSpot2);

        const accentLight = new THREE.PointLight(0xD4A853, 6, 8, 1.5);
        accentLight.position.set(0, 1.8, 9);
        scene.add(accentLight);

        // ─────────────────────────────────────
        // MATERIALS
        // ─────────────────────────────────────
        const matWall = new THREE.MeshStandardMaterial({ color: 0xF5F0E8, roughness: 0.75, metalness: 0.02 });
        const matFloor = new THREE.MeshStandardMaterial({ color: 0xC67B5C, roughness: 0.55, metalness: 0.05 });
        const matDarkTrim = new THREE.MeshStandardMaterial({ color: 0x1C1C1C, roughness: 0.4, metalness: 0.3 });
        const matDarkWood = new THREE.MeshStandardMaterial({ color: 0x3D2B1F, roughness: 0.5, metalness: 0.08 });
        const matGold = new THREE.MeshStandardMaterial({ color: 0xD4A853, roughness: 0.25, metalness: 0.7, emissive: 0x332200,
            emissiveIntensity: 0.3 });
        const matTerracotta = new THREE.MeshStandardMaterial({ color: 0xC67B5C, roughness: 0.6, metalness: 0.04 });
        const matWine = new THREE.MeshStandardMaterial({ color: 0x8B3A3A, roughness: 0.45, metalness: 0.2 });
        const matSage = new THREE.MeshStandardMaterial({ color: 0x8A9A7B, roughness: 0.55, metalness: 0.05 });
        const matGlow = new THREE.MeshStandardMaterial({ color: 0xD4A853, roughness: 0.15, metalness: 0.5, emissive: 0x553300,
            emissiveIntensity: 1.2 });
        const matSkin = new THREE.MeshStandardMaterial({ color: 0xD2A57C, roughness: 0.7, metalness: 0.02 });
        const matCloth1 = new THREE.MeshStandardMaterial({ color: 0x4A7C8C, roughness: 0.65, metalness: 0.03 });
        const matCloth2 = new THREE.MeshStandardMaterial({ color: 0x8B5E3C, roughness: 0.6, metalness: 0.04 });
        const matCloth3 = new THREE.MeshStandardMaterial({ color: 0x6B8E5A, roughness: 0.65, metalness: 0.03 });
        const matCloth4 = new THREE.MeshStandardMaterial({ color: 0x9B4A3A, roughness: 0.6, metalness: 0.04 });
        const matHair = new THREE.MeshStandardMaterial({ color: 0x2D1B0E, roughness: 0.7, metalness: 0.02 });

        // ─────────────────────────────────────
        // ROOM CONSTRUCTION
        // ─────────────────────────────────────
        const roomGroup = new THREE.Group();
        scene.add(roomGroup);
        const ROOM_W = 20;
        const ROOM_D = 18;
        const ROOM_H = 8;
        const WALL_THICK = 0.35;
        const DOOR_W = 3.6;
        const DOOR_H = 5.2;
        const DOOR_HALF = DOOR_W / 2;

        // Floor
        const floorGeo = new THREE.PlaneGeometry(ROOM_W, ROOM_D);
        const floorCanvas = document.createElement('canvas');
        floorCanvas.width = 512;
        floorCanvas.height = 460;
        const fctx = floorCanvas.getContext('2d');
        fctx.fillStyle = '#C67B5C';
        fctx.fillRect(0, 0, 512, 460);
        const tileW = 64;
        const tileH = 57;
        for (let row = 0; row < 8; row++) {
            for (let col = 0; col < 8; col++) {
                const offsetX = (row % 2) * (tileW / 2);
                const x = col * tileW + offsetX;
                const y = row * tileH;
                const shade = (row + col) % 3 === 0 ? '#D9A38B' : (row + col) % 3 === 1 ? '#C67B5C' : '#B8694A';
                fctx.fillStyle = shade;
                fctx.fillRect(x, y, tileW - 4, tileH - 4);
                fctx.strokeStyle = '#3D2B1F';
                fctx.lineWidth = 2;
                fctx.strokeRect(x, y, tileW - 4, tileH - 4);
            }
        }
        const floorTex = new THREE.CanvasTexture(floorCanvas);
        floorTex.wrapS = THREE.RepeatWrapping;
        floorTex.wrapT = THREE.RepeatWrapping;
        floorTex.colorSpace = THREE.SRGBColorSpace;
        const matFloorTex = new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.5, metalness: 0.03 });
        const floor = new THREE.Mesh(floorGeo, matFloorTex);
        floor.rotation.x = -Math.PI / 2;
        floor.position.set(0, -ROOM_H / 2, ROOM_D / 2);
        floor.receiveShadow = true;
        roomGroup.add(floor);

        // Ceiling
        const ceilingGeo = new THREE.PlaneGeometry(ROOM_W, ROOM_D);
        const matCeiling = new THREE.MeshStandardMaterial({ color: 0xEDE5D8, roughness: 0.8, metalness: 0.02 });
        const ceiling = new THREE.Mesh(ceilingGeo, matCeiling);
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.set(0, ROOM_H / 2, ROOM_D / 2);
        roomGroup.add(ceiling);

        // Entry wall (z=0) with arch doorway
        const entryWallGroup = new THREE.Group();
        entryWallGroup.position.set(0, 0, 0);
        roomGroup.add(entryWallGroup);

        const archRadius = DOOR_HALF;
        const archTopY = DOOR_H / 2;
        const pillarTopY = archTopY - archRadius;

        // Left pillar
        const pillarLeftGeo = new THREE.BoxGeometry(WALL_THICK, pillarTopY + ROOM_H / 2, WALL_THICK);
        const pillarLeft = new THREE.Mesh(pillarLeftGeo, matWall);
        pillarLeft.position.set(-DOOR_HALF, (pillarTopY - ROOM_H / 2) / 2, 0);
        pillarLeft.castShadow = true;
        pillarLeft.receiveShadow = true;
        entryWallGroup.add(pillarLeft);

        // Right pillar
        const pillarRightGeo = new THREE.BoxGeometry(WALL_THICK, pillarTopY + ROOM_H / 2, WALL_THICK);
        const pillarRight = new THREE.Mesh(pillarRightGeo, matWall);
        pillarRight.position.set(DOOR_HALF, (pillarTopY - ROOM_H / 2) / 2, 0);
        pillarRight.castShadow = true;
        pillarRight.receiveShadow = true;
        entryWallGroup.add(pillarRight);

        // Wall above arch
        const wallAboveGeo = new THREE.BoxGeometry(DOOR_W + WALL_THICK, ROOM_H / 2 - archTopY, WALL_THICK);
        const wallAbove = new THREE.Mesh(wallAboveGeo, matWall);
        wallAbove.position.set(0, (archTopY + ROOM_H / 2) / 2, 0);
        wallAbove.castShadow = true;
        entryWallGroup.add(wallAbove);

        // Wall left of doorway
        const wallLeftGeo = new THREE.BoxGeometry((ROOM_W - DOOR_W) / 2, ROOM_H, WALL_THICK);
        const wallLeft = new THREE.Mesh(wallLeftGeo, matWall);
        wallLeft.position.set(-DOOR_HALF - (ROOM_W - DOOR_W) / 4, 0, 0);
        wallLeft.castShadow = true;
        wallLeft.receiveShadow = true;
        entryWallGroup.add(wallLeft);

        // Wall right of doorway
        const wallRightGeo = new THREE.BoxGeometry((ROOM_W - DOOR_W) / 2, ROOM_H, WALL_THICK);
        const wallRight = new THREE.Mesh(wallRightGeo, matWall);
        wallRight.position.set(DOOR_HALF + (ROOM_W - DOOR_W) / 4, 0, 0);
        wallRight.castShadow = true;
        wallRight.receiveShadow = true;
        entryWallGroup.add(wallRight);

        // Arch trim (half torus)
        const archTrimGeo = new THREE.TorusGeometry(archRadius, 0.18, 16, 24, Math.PI);
        const archTrim = new THREE.Mesh(archTrimGeo, matDarkTrim);
        archTrim.position.set(0, pillarTopY, 0);
        archTrim.rotation.y = Math.PI / 2;
        archTrim.rotation.z = Math.PI;
        entryWallGroup.add(archTrim);

        // Arch keystone
        const keystoneGeo = new THREE.BoxGeometry(0.5, 0.35, WALL_THICK + 0.15);
        const keystone = new THREE.Mesh(keystoneGeo, matGold);
        keystone.position.set(0, archTopY, 0);
        entryWallGroup.add(keystone);

        // Side walls
        const sideWallGeo = new THREE.BoxGeometry(WALL_THICK, ROOM_H, ROOM_D);
        const leftSideWall = new THREE.Mesh(sideWallGeo, matWall);
        leftSideWall.position.set(-ROOM_W / 2, 0, ROOM_D / 2);
        leftSideWall.castShadow = true;
        leftSideWall.receiveShadow = true;
        roomGroup.add(leftSideWall);

        const rightSideWall = new THREE.Mesh(sideWallGeo, matWall);
        rightSideWall.position.set(ROOM_W / 2, 0, ROOM_D / 2);
        rightSideWall.castShadow = true;
        rightSideWall.receiveShadow = true;
        roomGroup.add(rightSideWall);

        // Far wall
        const farWallGeo = new THREE.BoxGeometry(ROOM_W, ROOM_H, WALL_THICK);
        const farWall = new THREE.Mesh(farWallGeo, matWall);
        farWall.position.set(0, 0, ROOM_D);
        farWall.castShadow = true;
        farWall.receiveShadow = true;
        roomGroup.add(farWall);

        // Baseboard trim along all walls
        function addBaseboard(x, z, w, d) {
            const bbGeo = new THREE.BoxGeometry(w, 0.35, d);
            const bb = new THREE.Mesh(bbGeo, matDarkTrim);
            bb.position.set(x, -ROOM_H / 2 + 0.175, z);
            bb.castShadow = true;
            bb.receiveShadow = true;
            roomGroup.add(bb);
        }
        addBaseboard(0, 0, ROOM_W - DOOR_W - 0.2, 0.15);
        addBaseboard(-ROOM_W / 2 + 0.08, ROOM_D / 2, 0.15, ROOM_D);
        addBaseboard(ROOM_W / 2 - 0.08, ROOM_D / 2, 0.15, ROOM_D);
        addBaseboard(0, ROOM_D - 0.08, ROOM_W, 0.15);

        // ─────────────────────────────────────
        // DOORS
        // ─────────────────────────────────────
        const doorGroupLeft = new THREE.Group();
        doorGroupLeft.position.set(-DOOR_HALF, 0, 0);
        entryWallGroup.add(doorGroupLeft);
        const doorGeoLeft = new THREE.BoxGeometry(DOOR_HALF - 0.08, DOOR_H - 0.15, 0.22);
        const doorLeft = new THREE.Mesh(doorGeoLeft, matDarkWood);
        doorLeft.position.set((DOOR_HALF - 0.08) / 2, 0, 0);
        doorLeft.castShadow = true;
        doorLeft.receiveShadow = true;
        doorGroupLeft.add(doorLeft);
        // Door panel detail
        const panelGeoLeft = new THREE.BoxGeometry(DOOR_HALF - 0.45, DOOR_H - 1.4, 0.06);
        const panelLeft = new THREE.Mesh(panelGeoLeft, matDarkTrim);
        panelLeft.position.set((DOOR_HALF - 0.08) / 2, 0, 0.14);
        doorGroupLeft.add(panelLeft);
        // Handle
        const handleGeoLeft = new THREE.SphereGeometry(0.13, 12, 12);
        const handleLeft = new THREE.Mesh(handleGeoLeft, matGold);
        handleLeft.position.set(DOOR_HALF - 0.45, 0.25, 0.18);
        doorGroupLeft.add(handleLeft);

        const doorGroupRight = new THREE.Group();
        doorGroupRight.position.set(DOOR_HALF, 0, 0);
        entryWallGroup.add(doorGroupRight);
        const doorGeoRight = new THREE.BoxGeometry(DOOR_HALF - 0.08, DOOR_H - 0.15, 0.22);
        const doorRight = new THREE.Mesh(doorGeoRight, matDarkWood);
        doorRight.position.set(-(DOOR_HALF - 0.08) / 2, 0, 0);
        doorRight.castShadow = true;
        doorRight.receiveShadow = true;
        doorGroupRight.add(doorRight);
        const panelGeoRight = new THREE.BoxGeometry(DOOR_HALF - 0.45, DOOR_H - 1.4, 0.06);
        const panelRight = new THREE.Mesh(panelGeoRight, matDarkTrim);
        panelRight.position.set(-(DOOR_HALF - 0.08) / 2, 0, 0.14);
        doorGroupRight.add(panelRight);
        const handleGeoRight = new THREE.SphereGeometry(0.13, 12, 12);
        const handleRight = new THREE.Mesh(handleGeoRight, matGold);
        handleRight.position.set(-DOOR_HALF + 0.45, 0.25, 0.18);
        doorGroupRight.add(handleRight);

        // ─────────────────────────────────────
        // TIMELINE ON LEFT WALL
        // ─────────────────────────────────────
        const timelineGroup = new THREE.Group();
        timelineGroup.position.set(-ROOM_W / 2 + 0.55, 0.5, ROOM_D / 2);
        roomGroup.add(timelineGroup);

        const timelineRailGeo = new THREE.BoxGeometry(0.08, 0.08, ROOM_D - 3);
        const timelineRail = new THREE.Mesh(timelineRailGeo, matGold);
        timelineRail.position.set(0, 1.2, 0);
        timelineGroup.add(timelineRail);

        const timelineMarkers = [
            { z: -6.5, label: 'Origin', year: 'Founding', info: 'Machina Mundi began as a small introductory summer program of three 3-hour sessions in Hartford and East Hartford, aimed at bridging the AI education gap.' },
            { z: -3.5, label: 'Discovery', year: 'The Pivot',
                info: 'Students revealed that existing AI chatbots failed to understand their natural speech patterns. This exposed the critical underrepresentation of AAVE in training data, reshaping the mission toward systemic data reform.' },
            { z: -0.5, label: 'Project POLLEN', year: 'Dataset Launch',
                info: 'Project POLLEN was established to create a community-owned, linguistically inclusive data architecture, ultimately compiling nearly 50,000 words of conversational AAVE.' },
            { z: 2.5, label: 'Growth', year: '900+ Students',
                info: 'The AI Pathways Camp surpassed 900 students trained in foundational AI concepts, model training, and ethical analysis of AI infrastructure.' },
            { z: 5.5, label: 'Policy', year: 'Federal Action',
                info: 'Partnering with the Office of Congressman John Larson, Machina Mundi authored research briefs and a formal federal grant proposal, formally introduced in 2026 to fund AI educational infrastructure.' },
            { z: 7.5, label: 'Recognition', year: 'Princeton Prize',
                info: 'Named a Regional Finalist for the Princeton Prize in Race Relations (2026) for measurable, structural impact on racial equity, data bias, and education access.' },
        ];

        const timelineNodes = [];
        timelineMarkers.forEach((marker) => {
            const nodeGroup = new THREE.Group();
            nodeGroup.position.set(0, 1.2, marker.z);
            const dotGeo = new THREE.SphereGeometry(0.2, 16, 16);
            const dot = new THREE.Mesh(dotGeo, matGlow);
            nodeGroup.add(dot);
            const ringGeo = new THREE.TorusGeometry(0.32, 0.05, 12, 20);
            const ring = new THREE.Mesh(ringGeo, matGold);
            ring.rotation.x = Math.PI / 2;
            nodeGroup.add(ring);
            nodeGroup.userData = {
                interactive: true,
                infoTitle: marker.label + ' (' + marker.year + ')',
                infoBody: marker.info,
                isTimelineNode: true,
            };
            timelineGroup.add(nodeGroup);
            timelineNodes.push(nodeGroup);
        });

        // ─────────────────────────────────────
        // PROJECT POLLEN DATA VIZ (CENTER)
        // ─────────────────────────────────────
        const pollenGroup = new THREE.Group();
        pollenGroup.position.set(0, 0.2, 9);
        roomGroup.add(pollenGroup);
        pollenGroup.userData = {
            interactive: true,
            infoTitle: 'Project POLLEN & ConvoAAVE Dataset',
            infoBody: 'Project POLLEN compiled nearly 50,000 words of conversational AAVE. The 6-step methodology spans community partnerships, conversational recording, transcription, dataset assembly on GitHub, model training and evaluation, and returning optimized models to the community. The fine-tuned models demonstrated immediate improvements in understanding dialectal expressions.',
        };

        // Central glowing orb
        const coreGeo = new THREE.IcosahedronGeometry(0.7, 1);
        const core = new THREE.Mesh(coreGeo, matGlow);
        pollenGroup.add(core);

        // Orbiting particles
        const orbitParticles = [];

        // RAYCASTER

        const raycaster = new THREE.Raycaster();

        let hoveredObject = null;

        function getIntersections(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const allTargets = [];
            interactiveObjects.forEach(obj => {
                if (obj.isMesh) allTargets.push(obj);
                else if (obj.children) {
                    obj.traverse(child => {
                        if (child.isMesh) allTargets.push(child);
                    });
                }
            });
            // Also check the objects themselves
            const uniqueTargets = [...new Set([...interactiveObjects, ...allTargets])];
            return raycaster.intersectObjects(uniqueTargets, true);
        }

        function findInteractiveAncestor(obj) {
            let current = obj;
            while (current) {
                if (interactiveObjects.includes(current)) return current;
                if (current.userData && current.userData.interactive) return current;
                current = current.parent;
            }
            return null;
        }

            if (intersects.length > 0) {
                const ancestor = findInteractiveAncestor(intersects[0].object);
                if (ancestor && ancestor.userData && ancestor.userData.interactive) {
                    if (hoveredObject !== ancestor) {
                        if (hoveredObject && hoveredObject.userData._originalEmissive) {
                            resetHighlight(hoveredObject);

                        hoveredObject = ancestor;
                        highlightObject(hoveredObject);
                        cursorOverInteractive = true;

            if (hoveredObject) {

                    if (child.material.emissive) {

        }

            obj.traverse(child => {
                if (child.isMesh && child.material && child.userData._originalEmissive !== undefined) {
                    child.material.emissiveIntensity = child.userData._originalEmissive;
                    if (child.userData._originalEmissiveColor !== null && child.material.emissive) {

                    delete child.userData._originalEmissive;

        // ─────────────────────────────────────
        // DOOR ANIMATION STATE MACHINE
        // ─────────────────────────────────────
        let doorAnimationState = 'idle'; // idle -> opening -> transitioning -> complete
        let doorAnimProgress = 0;
        let doorAnimDuration = 1.2; // seconds for doors to open
        let cameraAnimDuration = 2.0; // seconds for camera to move inside
        let cameraAnimProgress = 0;
        let doorAnimStartTime = 0;
        let cameraAnimStartTime = 0;
        const cameraStartPos = new THREE.Vector3(0, 1.2, -7);
        const cameraEndPos = new THREE.Vector3(0, 1.6, 9);
        const doorOpenAngle = Math.PI / 2.2;

        function startDoorSequence() {
            if (doorAnimationState !== 'idle') return;
            doorAnimationState = 'opening';
            doorAnimProgress = 0;
            doorAnimStartTime = performance.now() / 1000;
            overlayWelcome.classList.add('hidden');
            doorClickZone.style.pointerEvents = 'none';
        }

        function updateDoorAnimation(now) {
            if (doorAnimationState === 'opening') {
                const elapsed = now - doorAnimStartTime;
                doorAnimProgress = Math.min(elapsed / doorAnimDuration, 1.0);
                const eased = easeInOutCubic(doorAnimProgress);
                doorGroupLeft.rotation.y = eased * doorOpenAngle;
                doorGroupRight.rotation.y = -eased * doorOpenAngle;
                if (doorAnimProgress >= 1.0) {
                    doorAnimationState = 'transitioning';
                    cameraAnimProgress = 0;
                    cameraAnimStartTime = now;
                }
            }
            if (doorAnimationState === 'transitioning') {
                const elapsed = now - cameraAnimStartTime;
                cameraAnimProgress = Math.min(elapsed / cameraAnimDuration, 1.0);
                const eased = easeInOutCubic(cameraAnimProgress);
                camera.position.lerpVectors(cameraStartPos, cameraEndPos, eased);
                orbitControls.target.set(0, 0.8, 9);
                orbitControls.update();
                if (cameraAnimProgress >= 1.0) {
                    doorAnimationState = 'complete';
                    orbitControls.enabled = true;
                    orbitControls.target.set(0, 0.8, 9);
                    orbitControls.update();
                    document.body.style.cursor = 'grab';
                    doorClickZone.style.display = 'none';
                }
            }
        }

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        // ─────────────────────────────────────
        // ANIMATION LOOP
        // ─────────────────────────────────────
        const clock = new THREE.Clock();
        function animate(timestamp) {
            requestAnimationFrame(animate);

            const now = timestamp / 1000;
            const dt = Math.min(clock.getDelta(), 0.1);

            // Door animation
            updateDoorAnimation(now);

            // Orbit controls update
            if (orbitControls.enabled) {
                orbitControls.update();
            }

            // Animate POLLEN particles
            orbitParticles.forEach(p => {
                p.userData.orbitAngle += p.userData.orbitSpeed * dt;
                const a = p.userData.orbitAngle;
                const r = p.userData.orbitRadius;
                p.position.x = Math.cos(a) * r;
                p.position.z = Math.sin(a) * r;
                p.position.y += Math.sin(now * 1.5 + p.userData.orbitAngle) * dt * 0.3;
                p.position.y = THREE.MathUtils.clamp(p.position.y, p.userData.orbitHeight - 1.5, p.userData
                    .orbitHeight + 1.5);
            });

            // Rotate POLLEN rings
            ringLarge.rotation.z += dt * 0.15;
            ringSmall.rotation.z -= dt * 0.2;
            ringSmall.rotation.x += dt * 0.1;

            // Pulse core
            const coreScale = 1 + Math.sin(now * 2) * 0.15;
            core.scale.setScalar(coreScale);
            core.material.emissiveIntensity = 1.2 + Math.sin(now * 2.5) * 0.4;

            // Animate ambient particles
            ambientParticles.forEach(p => {
                const ud = p.userData;
                p.position.y = ud.floatBase + Math.sin(now * ud.floatSpeed + ud.floatPhase) * ud.floatAmp;
                p.position.x += ud.driftX * dt * 0.3;
                p.position.z += ud.driftZ * dt * 0.3;
                if (p.position.x < -ROOM_W / 2 + 0.5 || p.position.x > ROOM_W / 2 - 0.5) ud.driftX *= -1;
                if (p.position.z < 0.5 || p.position.z > ROOM_D - 0.5) ud.driftZ *= -1;
            });

            // Pulse timeline nodes
            timelineNodes.forEach((node, i) => {
                const s = 1 + Math.sin(now * 2.2 + i * 0.9) * 0.2;
                node.children.forEach(c => {
                    if (c.geometry && c.geometry.type === 'SphereGeometry') {
                        c.scale.setScalar(s);
                    }
                });
            });

            // Pulse easter egg
            if (easterEggGroup.userData._eggBody) {
                const es = 1 + Math.sin(now * 3.5) * 0.25;
                easterEggGroup.userData._eggBody.scale.set(1 * es, 1.3 * es, 1 * es);
            }

            // Subtle figure bobbing
            [figure1, figure2, figure3, figure4].forEach((fig, i) => {
                fig.position.y = 0.25 + Math.sin(now * 1.8 + i * 1.3) * 0.06;
            });

            // Animate policy ring
            policyRing.rotation.z += dt * 0.4;
            policyRing.rotation.x += dt * 0.25;

            // Render
            renderer.render(scene, camera);
        }

        // ─────────────────────────────────────
        // RESIZE HANDLER
        // ─────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ─────────────────────────────────────
        // KEYBOARD SHORTCUT TO CLOSE INFO
        // ─────────────────────────────────────
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                hideInfo();
            }
        });

        // ─────────────────────────────────────
        // START
        // ─────────────────────────────────────
        document.body.style.cursor = 'default';
        orbitControls.enabled = false;
        doorAnimationState = 'idle';
        infoPanel.classList.remove('visible');
        overlayWelcome.classList.remove('hidden');
        doorClickZone.style.pointerEvents = 'auto';
        doorClickZone.style.display = 'block';
        camera.position.copy(cameraStartPos);
        camera.lookAt(0, 0.6, 0);
        orbitControls.target.set(0, 0.8, 9);
        orbitControls.update();
        doorGroupLeft.rotation.y = 0;
        doorGroupRight.rotation.y = 0;

        requestAnimationFrame(animate);

        console.log('Welcome to Machina Mundi. Push the doors to enter the exhibition.');
        console.log('Click on glowing markers and exhibits to learn more.');
        console.log('Look for hidden easter eggs throughout the room.');
    </script>
</body>
</html>
